<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم ثبت نام</title>
</head>
<body dir="rtl">
    <form action="#">
        <label for="name">نام</label>
            <input type="text" id="name" name="name" required>
        <br>
        <label for="lastname">نام خانوداگی</label>
            <input type="text" id="lastname" name="lastname" required>
        <br>
        <label for="email">ایمیل</label>
            <input type="email" id="email" name="email" required placeholder="xyz@gmail.com">
        <br>
        <label for="pass">رمز عبور</label>
            <input type="password" id="pass" name="pass" required>
        <br>
        <label for="passrepet">تکرار رمز عبور</label>
            <input type="password" id="passrepet" name="passrepet" required>
        <br>
        <label for="sex">جنسیت</label>
            <select name="sex" id="sex" required>
                <option value="women">خانم</option>
                <option value="men">آقا</option>
            </select>
        <br>
        <label for="dateofbirth">تاریخ تولد</label>
            <input type="date" id="dateofbirth" name="dateofbirth" required>
        <br>
        <label for="city">شهر</label>
            <select name="city" id="city" required>
                <option value="" disabled selected hidden >شهر خود را انتخاب کنید</option>
                <option value="tehran">تهران</option>
                <option value="mashhad">مشهد</option>
                <option value="shiraz">شیراز</option>
            </select>
        <br>
        <button type="submit">ثبت نهایی</button>
    </form>
    
</body>
</html>
